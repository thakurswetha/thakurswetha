<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="50%" stop-color="#0f2942"/>
      <stop offset="100%" stop-color="#13344f"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#43e97b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- grid dots background -->
  <g opacity="0.15">
    <circle cx="60" cy="30" r="1" fill="#ffffff"/>
    <circle cx="120" cy="30" r="1" fill="#ffffff"/>
    <circle cx="180" cy="30" r="1" fill="#ffffff"/>
    <circle cx="60" cy="190" r="1" fill="#ffffff"/>
    <circle cx="120" cy="190" r="1" fill="#ffffff"/>
    <circle cx="1080" cy="30" r="1" fill="#ffffff"/>
    <circle cx="1140" cy="30" r="1" fill="#ffffff"/>
    <circle cx="1080" cy="190" r="1" fill="#ffffff"/>
    <circle cx="1140" cy="190" r="1" fill="#ffffff"/>
  </g>

  <!-- animated bar chart, bottom left -->
  <g opacity="0.55">
    <rect x="50" y="160" width="14" height="40" fill="#4facfe">
      <animate attributeName="height" values="40;65;40" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="160;135;160" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="70" y="145" width="14" height="55" fill="#43e97b">
      <animate attributeName="height" values="55;30;55" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="145;170;145" dur="2.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="90" y="170" width="14" height="30" fill="#00f2fe">
      <animate attributeName="height" values="30;58;30" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="170;142;170" dur="2.7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- mirrored bar chart, bottom right -->
  <g opacity="0.55">
    <rect x="1096" y="170" width="14" height="30" fill="#43e97b">
      <animate attributeName="height" values="30;55;30" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="170;145;170" dur="2.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="1116" y="150" width="14" height="50" fill="#00f2fe">
      <animate attributeName="height" values="50;28;50" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="150;172;150" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="1136" y="160" width="14" height="40" fill="#4facfe">
      <animate attributeName="height" values="40;62;40" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="160;138;160" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- flowing line chart trail across the whole banner -->
  <path fill="none" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5"
    d="M0,55 C150,20 300,90 450,50 C600,15 750,85 900,45 C1000,20 1100,60 1200,35">
    <animate attributeName="d" dur="7s" repeatCount="indefinite"
      values="
      M0,55 C150,20 300,90 450,50 C600,15 750,85 900,45 C1000,20 1100,60 1200,35;
      M0,45 C150,80 300,25 450,65 C600,90 750,30 900,60 C1000,80 1100,30 1200,55;
      M0,55 C150,20 300,90 450,50 C600,15 750,85 900,45 C1000,20 1100,60 1200,35
      "/>
  </path>

  <!-- moving dot riding the line -->
  <circle r="4" fill="#00f2fe">
    <animateMotion dur="7s" repeatCount="indefinite"
      path="M0,55 C150,20 300,90 450,50 C600,15 750,85 900,45 C1000,20 1100,60 1200,35"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- name with cyan accent underline that draws in -->
  <text x="600" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="700" fill="#ffffff" text-anchor="middle">Thakur Swetha Bai</text>

  <line x1="430" y1="138" x2="770" y2="138" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x1" values="600;430;430" dur="1.8s" begin="0.3s" fill="freeze"/>
  </line>
</svg>
